<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Penalty Shootout Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0b6623;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .goal {
      position: relative;
      width: 300px;
      height: 150px;
      border: 5px solid white;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .cell {
      border: 1px dashed rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .cell:hover {
      background: rgba(255,255,255,0.2);
    }

    .ball {
      font-size: 24px;
    }

    .goalkeeper {
      position: absolute;
      bottom: 10px;
      left: 120px;
      font-size: 30px;
      transition: 0.3s;
    }

    #result {
      font-size: 22px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>⚽ Penalty Shootout</h1>

  <div class="goal" id="goal">
    <div class="cell" data-pos="0"></div>
    <div class="cell" data-pos="1"></div>
    <div class="cell" data-pos="2"></div>
    <div class="cell" data-pos="3"></div>
    <div class="cell" data-pos="4"></div>
    <div class="cell" data-pos="5"></div>
    <div class="goalkeeper" id="keeper">🧤</div>
  </div>

  <p id="result">Choose where to shoot!</p>
  <p>Score: <span id="score">0</span></p>

  <button onclick="resetGame()">Reset</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const result = document.getElementById('result');
    const scoreDisplay = document.getElementById('score');
    const keeper = document.getElementById('keeper');

    let score = 0;

    cells.forEach(cell => {
      cell.addEventListener('click', shoot);
    });

    function shoot(e) {
      const playerChoice = e.target.dataset.pos;
      const keeperChoice = Math.floor(Math.random() * 6);

      clearCells();

      // Move goalkeeper
      const positions = [
        "left: 20px; top: 10px;",
        "left: 120px; top: 10px;",
        "left: 220px; top: 10px;",
        "left: 20px; bottom: 10px;",
        "left: 120px; bottom: 10px;",
        "left: 220px; bottom: 10px;"
      ];

      keeper.style = "position:absolute;" + positions[keeperChoice];

      if (playerChoice == keeperChoice) {
        result.textContent = "❌ Saved by the goalkeeper!";
      } else {
        result.textContent = "🎉 GOAL!!!";
        score++;
        scoreDisplay.textContent = score;
      }

      // Show ball
      e.target.innerHTML = "<span class='ball'>⚽</span>";
    }

    function clearCells() {
      cells.forEach(cell => cell.innerHTML = "");
    }

    function resetGame() {
      score = 0;
      scoreDisplay.textContent = score;
      result.textContent = "Choose where to shoot!";
      clearCells();
      keeper.style = "left:120px; bottom:10px;";
    }
  </script>

</body>
</html>
